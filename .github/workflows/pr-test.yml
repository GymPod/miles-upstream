name: PR Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recovered-engine-smoke:
    uses: ./.github/workflows/_run-ci.yml
    with:
      runs_on: '["h100", "8gpu"]'
      container_image: radixark/miles:dev
      execute_command: >-
        python tests/ci/run_suite.py --hw cuda --suite stage-c-8-gpu-h100
        --auto-partition-id 1 --auto-partition-size 8
        --cadence regular --labels run-ci-short
    secrets: inherit
